services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: toxinmap-postgis
    restart: unless-stopped
    environment:
      POSTGRES_DB: toxinmap
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - toxinmap-postgis-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d toxinmap"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  toxinmap-postgis-data:
